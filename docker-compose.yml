services:
  # ── PostgreSQL Database ──────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: greenline-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-greenline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenline_secret}
      POSTGRES_DB: ${POSTGRES_DB:-greenline_db}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-greenline} -d ${POSTGRES_DB:-greenline_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - greenline-network

  # ── Express TypeScript API ──────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: greenline-api:latest
    container_name: greenline-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-3000}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-greenline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenline_secret}
      POSTGRES_DB: ${POSTGRES_DB:-greenline_db}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - greenline-network

volumes:
  postgres_data:
    driver: local

networks:
  greenline-network:
    driver: bridge
